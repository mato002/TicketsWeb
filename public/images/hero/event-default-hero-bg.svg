<!-- Event Default Hero Background -->
<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eventDefaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#eventDefaultGrad)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="#000000" opacity="0.4"/>
  <circle cx="1600" cy="200" r="150" fill="#ffffff" opacity="0.03"/>
  <circle cx="300" cy="800" r="100" fill="#ffffff" opacity="0.05"/>
  <circle cx="1000" cy="400" r="80" fill="#ffffff" opacity="0.04"/>
</svg>
