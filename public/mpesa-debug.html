<!DOCTYPE html>
<html>
<head>
    <title>M-Pesa Debug Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">M-Pesa Debug Tool</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">Test Configuration</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Phone Number</label>
                    <input type="text" id="phone" value="254712345678" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Amount (KES)</label>
                    <input type="number" id="amount" value="1" class="w-full p-2 border rounded">
                </div>
            </div>
            <button onclick="testMpesa()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                Test M-Pesa API
            </button>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">Results</h2>
            <pre id="results" class="bg-gray-50 p-4 rounded text-sm overflow-x-auto">Click "Test M-Pesa API" to see results...</pre>
        </div>
    </div>

    <script>
        async function testMpesa() {
            const results = document.getElementById('results');
            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;
            
            results.textContent = 'Testing M-Pesa API...';
            
            try {
                const response = await fetch('/debug/mpesa/test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || ''
                    },
                    body: JSON.stringify({ phone, amount })
                });
                
                const data = await response.json();
                results.textContent = JSON.stringify(data, null, 2);
                
                // Highlight errors in red
                if (!data.success) {
                    results.classList.add('text-red-600');
                } else {
                    results.classList.remove('text-red-600');
                }
                
            } catch (error) {
                results.textContent = 'Error: ' + error.message;
                results.classList.add('text-red-600');
            }
        }
        
        // Auto-test on page load
        window.addEventListener('load', function() {
            setTimeout(testMpesa, 1000);
        });
    </script>
</body>
</html>
